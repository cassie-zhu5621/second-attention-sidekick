<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SECOND ATTENTION // DATASET</title>
<style>
  :root{ --bg:#0a0b0a; --line:#23271f; --fg:#f3f5ef; --dim:#7c8175; --acid:#c8ff32; }
  *{box-sizing:border-box}
  body{margin:0; background:var(--bg); color:var(--fg);
    font-family:"DejaVu Sans Mono",ui-monospace,Menlo,Consolas,monospace}
  header{display:flex; align-items:center; gap:14px; padding:12px 16px;
    border-bottom:1px solid var(--line); position:sticky; top:0; background:var(--bg); z-index:5}
  .logo{font-weight:700; letter-spacing:.14em; font-size:13px}
  .logo b{color:var(--acid)}
  button{background:var(--acid); color:#0a0b0a; border:0; padding:7px 12px;
    font:inherit; font-weight:700; font-size:12px; cursor:pointer; border-radius:2px}
  button.ghost{background:transparent; color:var(--fg); border:1px solid var(--line)}
  #rec.rec-on{background:#ff3b3b; color:#0a0b0a; border-color:#ff3b3b; animation:pulse 1.2s infinite}
  @keyframes pulse{50%{opacity:.55}}
  .spacer{flex:1}
  .stat{display:flex; align-items:center; gap:7px; font-size:12px; color:var(--dim)}
  .dot{width:9px; height:9px; border-radius:50%; background:#444}
  .dot.on{background:var(--acid); box-shadow:0 0 8px var(--acid)}
  .num{color:var(--acid); font-weight:700}
  main{display:grid; grid-template-columns:360px 1fr; min-height:calc(100vh - 53px)}
  .live{border-right:1px solid var(--line); padding:16px}
  .live h2,.grid-wrap h2{font-size:11px; letter-spacing:.16em; color:var(--dim); margin:0 0 10px}
  .liveframe{width:100%; aspect-ratio:4/3; background:#000; border:1px solid var(--line); display:block; object-fit:cover}
  .label{margin-top:10px; font-size:12px; color:var(--dim)}
  .label .s{color:var(--acid)}
  .grid-wrap{padding:16px}
  .grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:8px}
  .cell{position:relative; aspect-ratio:4/3; background:#000; border:1px solid var(--line); overflow:hidden; cursor:pointer}
  .cell img{width:100%; height:100%; object-fit:cover; display:block; transition:transform .25s ease}
  .cell:hover{border-color:var(--acid)}
  .cell:hover img{transform:scale(1.05)}
  .cell .idx{position:absolute; left:0; bottom:0; background:#000a; color:var(--acid); font-size:10px; padding:2px 5px}
  .empty{color:var(--dim); font-size:13px; padding:40px 0; text-align:center}
  .box{position:fixed; inset:0; background:#000d; display:none; align-items:center; justify-content:center; z-index:20}
  .box.show{display:flex}
  .box img{max-width:92vw; max-height:88vh; border:1px solid var(--acid)}
  .box .x{position:absolute; top:16px; right:20px; color:var(--fg); font-size:24px; cursor:pointer}
</style>
</head>
<body>
<header>
  <div class="logo">SECOND<b>·</b>ATTENTION <span style="color:var(--dim)">/ DATASET</span></div>
  <div class="spacer"></div>
  <div class="stat"><span id="dot" class="dot"></span><span id="state">connecting</span></div>
  <div class="stat">FRAMES <span id="count" class="num">0</span></div>
  <button id="mode" class="ghost">MODE: TIMED</button>
  <div class="stat">EVERY <input id="iv" type="number" min="0.5" step="0.5" value="5"
       style="width:54px; background:#000; border:1px solid var(--line); color:var(--acid);
              font:inherit; font-weight:700; padding:5px 6px; border-radius:2px"> s</div>
  <button id="rec" class="ghost">● START</button>
  <button id="auto" class="ghost">AUTO ·</button>
</header>

<main>
  <section class="live">
    <h2>LIVE</h2>
    <img id="live" class="liveframe" alt="">
    <div class="label">STATE <span id="livestate" class="s">—</span> · DIFF <span id="livediff" class="s">—</span></div>
  </section>
  <section class="grid-wrap">
    <h2>CAPTURES</h2>
    <div id="grid" class="grid"></div>
    <div id="empty" class="empty">press START — TIMED saves one frame every N seconds; STILL saves only paused views</div>
  </section>
</main>

<div id="box" class="box"><span class="x">×</span><img id="boximg" alt=""></div>

<script>
const $ = s => document.querySelector(s);
let autoOn = true, recording = false, mode = "timed", seen = new Set();

function refreshLive(){ $("#live").src = "/api/live?t=" + Date.now(); }

async function refreshStatus(){
  try{
    const s = await (await fetch("/api/status", {cache:"no-store"})).json();
    $("#dot").classList.toggle("on", s.online);
    $("#state").textContent = s.online ? "camera online" : "camera offline";
    $("#count").textContent = s.count;
    recording = !!s.recording;
    $("#rec").textContent = recording ? "● REC" : "● START";
    $("#rec").classList.toggle("rec-on", recording);
    $("#livestate").textContent = s.still ? "OBSERVING" : "searching";
    $("#livediff").textContent = s.diff;
    mode = s.mode || "timed";
    $("#mode").textContent = "MODE: " + mode.toUpperCase();
    if(document.activeElement !== $("#iv")) $("#iv").value = s.interval;
  }catch(e){
    $("#dot").classList.remove("on"); $("#state").textContent = "collector offline";
  }
}

async function refreshList(){
  try{
    let files = await (await fetch("/api/list", {cache:"no-store"})).json();
    files.sort().reverse();
    $("#empty").style.display = files.length ? "none" : "block";
    const grid = $("#grid");
    for(const f of files){
      if(seen.has(f)) continue; seen.add(f);
      const cell = document.createElement("div"); cell.className = "cell";
      const img = document.createElement("img"); img.loading = "lazy";
      img.src = "/api/img?f=" + encodeURIComponent(f);
      const idx = document.createElement("span"); idx.className = "idx";
      idx.textContent = "#" + ((f.match(/IMG_(\d+)_/) || [,"?"])[1]);
      cell.appendChild(img); cell.appendChild(idx);
      cell.onclick = () => { $("#boximg").src = img.src; $("#box").classList.add("show"); };
      grid.insertBefore(cell, grid.firstChild);
    }
  }catch(e){}
}

function tick(){ if(!autoOn) return; refreshLive(); refreshStatus(); refreshList(); }
setInterval(tick, 1500); tick();

$("#rec").onclick = async () => {
  try{ await fetch(recording ? "/api/stop" : "/api/start", {cache:"no-store"}); }catch(e){}
  refreshStatus();
};
$("#auto").onclick = () => {
  autoOn = !autoOn;
  $("#auto").textContent = autoOn ? "AUTO ·" : "PAUSED";
  $("#auto").style.color = autoOn ? "" : "var(--acid)";
};
$("#iv").onchange = async () => {
  const v = Math.max(0.5, parseFloat($("#iv").value) || 5);
  try{ await fetch("/api/set?interval=" + v, {cache:"no-store"}); }catch(e){}
  refreshStatus();
};
$("#mode").onclick = async () => {
  const next = mode === "timed" ? "still" : "timed";
  try{ await fetch("/api/set?mode=" + next, {cache:"no-store"}); }catch(e){}
  refreshStatus();
};
$("#box").onclick = () => $("#box").classList.remove("show");
</script>
</body>
</html>
